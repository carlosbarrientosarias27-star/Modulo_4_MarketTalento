name: CI Markettalento Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # Matriz de versiones solicitada
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14-dev"]

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov bandit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 🛡️ Análisis de Seguridad (Bandit)
      run: bandit -r services/ routes/ app.py

    - name: 🎨 Linting con Flake8
      run: |
        # Detiene la ejecución si hay errores sintácticos de Python
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Advertencias de estilo (opcional, no detiene el proceso)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: 🧪 Ejecutar Tests con Pytest y Cobertura
      run: |
        # Ejecuta tests y genera reporte de cobertura en consola
        pytest --cov=services --cov=routes --cov=app --cov-report=term-missing